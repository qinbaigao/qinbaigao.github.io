<style>
  body.page-wrapper {
    isolation: isolate;
    background:
      radial-gradient(circle at 18% 8%, rgba(125, 211, 252, 0.2), transparent 28rem),
      radial-gradient(circle at 82% 22%, rgba(99, 102, 241, 0.12), transparent 26rem),
      linear-gradient(180deg, #f7fbff 0%, #ffffff 46%, #f8fbff 100%);
  }

  html.dark body.page-wrapper,
  .dark body.page-wrapper {
    background:
      radial-gradient(circle at 18% 8%, rgba(14, 165, 233, 0.16), transparent 28rem),
      radial-gradient(circle at 82% 22%, rgba(129, 140, 248, 0.13), transparent 26rem),
      linear-gradient(180deg, #07111f 0%, #0b1220 48%, #09090b 100%);
  }

  #page-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }

  #page-bg::before {
    content: "";
    position: absolute;
    inset: 0;
    opacity: 0.46;
    background-image:
      linear-gradient(rgba(14, 116, 144, 0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(14, 116, 144, 0.08) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), transparent 76%);
  }

  #page-bg::after {
    content: "";
    position: absolute;
    inset: 0;
    opacity: 0.62;
    background:
      linear-gradient(115deg, transparent 0 38%, rgba(56, 189, 248, 0.08) 48%, transparent 58% 100%),
      linear-gradient(72deg, transparent 0 54%, rgba(79, 70, 229, 0.065) 62%, transparent 72% 100%);
  }

  .dark #page-bg::before {
    opacity: 0.34;
    background-image:
      linear-gradient(rgba(125, 211, 252, 0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(125, 211, 252, 0.08) 1px, transparent 1px);
  }

  .dark #page-bg::after {
    opacity: 0.42;
  }

  #qbg-field {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0.78;
  }

  .page-header,
  .page-body,
  .page-footer,
  #hb-notification-container {
    position: relative;
    z-index: 1;
  }

  .page-header {
    z-index: 30;
  }

  #section-resume-biography-3 > .absolute.inset-0.-z-10 {
    opacity: 0.42;
    filter: saturate(0.75) hue-rotate(8deg);
  }

  #section-resume-biography-3 .avatar-wrapper {
    transition: transform 420ms ease, filter 420ms ease;
  }

  #section-resume-biography-3 .avatar-wrapper:hover {
    transform: translateY(-3px);
    filter: drop-shadow(0 18px 36px rgba(14, 116, 144, 0.18));
  }

  #papers article {
    position: relative;
    overflow: hidden;
    transition:
      transform 220ms ease,
      border-color 220ms ease,
      box-shadow 220ms ease,
      background-color 220ms ease;
  }

  #papers article::before {
    content: "";
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 220ms ease;
    background:
      linear-gradient(110deg, transparent 0 34%, rgba(56, 189, 248, 0.12) 45%, transparent 56% 100%);
  }

  #papers article:hover {
    transform: translateY(-3px);
    box-shadow: 0 18px 42px -28px rgba(2, 132, 199, 0.45);
  }

  #papers article:hover::before {
    opacity: 1;
  }

  #papers article > * {
    position: relative;
    z-index: 1;
  }

  .dark #papers article:hover {
    box-shadow: 0 18px 42px -28px rgba(56, 189, 248, 0.4);
  }

  @media (max-width: 640px) {
    #page-bg::before {
      background-size: 34px 34px;
      opacity: 0.32;
    }

    #qbg-field {
      opacity: 0.52;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    #qbg-field {
      display: none;
    }

    #section-resume-biography-3 .avatar-wrapper,
    #papers article {
      transition: none;
    }

    #section-resume-biography-3 .avatar-wrapper:hover,
    #papers article:hover {
      transform: none;
    }
  }
</style>

<script>
  (function () {
    var motionQuery = window.matchMedia("(prefers-reduced-motion: reduce)");
    if (motionQuery.matches) return;

    function initField() {
      var host = document.getElementById("page-bg");
      if (!host || document.getElementById("qbg-field")) return;

      var canvas = document.createElement("canvas");
      canvas.id = "qbg-field";
      canvas.setAttribute("aria-hidden", "true");
      host.appendChild(canvas);

      var ctx = canvas.getContext("2d", { alpha: true });
      var dpr = Math.min(window.devicePixelRatio || 1, 2);
      var width = 0;
      var height = 0;
      var points = [];
      var pointer = { x: -9999, y: -9999, active: false };
      var last = 0;

      function isDark() {
        return document.documentElement.classList.contains("dark");
      }

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = width + "px";
        canvas.style.height = height + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        var count = Math.min(58, Math.max(28, Math.floor(width / 32)));
        points = Array.from({ length: count }, function (_, index) {
          var lane = index / count;
          return {
            x: (lane * width + Math.random() * 90) % width,
            y: Math.random() * height,
            vx: (Math.random() - 0.5) * 0.18,
            vy: -0.08 - Math.random() * 0.16,
            r: 0.8 + Math.random() * 1.6,
            phase: Math.random() * Math.PI * 2
          };
        });
      }

      function trackPointer(event) {
        pointer.x = event.clientX;
        pointer.y = event.clientY;
        pointer.active = true;
      }

      function releasePointer() {
        pointer.active = false;
      }

      function draw(time) {
        var elapsed = Math.min(32, time - last || 16);
        last = time;

        ctx.clearRect(0, 0, width, height);
        var dark = isDark();
        var dot = dark ? "rgba(125, 211, 252, 0.46)" : "rgba(2, 132, 199, 0.32)";
        var line = dark ? "rgba(125, 211, 252, " : "rgba(14, 116, 144, ";
        var cursor = dark ? "rgba(129, 140, 248, 0.26)" : "rgba(56, 189, 248, 0.2)";

        for (var i = 0; i < points.length; i += 1) {
          var p = points[i];
          p.phase += elapsed * 0.0012;
          p.x += p.vx * elapsed + Math.sin(p.phase) * 0.055;
          p.y += p.vy * elapsed;

          if (p.y < -20) p.y = height + 20;
          if (p.x < -20) p.x = width + 20;
          if (p.x > width + 20) p.x = -20;

          if (pointer.active) {
            var dx = pointer.x - p.x;
            var dy = pointer.y - p.y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 150 && dist > 1) {
              var pull = (1 - dist / 150) * 0.018 * elapsed;
              p.x += dx * pull;
              p.y += dy * pull;
            }
          }

          ctx.beginPath();
          ctx.fillStyle = dot;
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        }

        for (var a = 0; a < points.length; a += 1) {
          for (var b = a + 1; b < points.length; b += 1) {
            var pa = points[a];
            var pb = points[b];
            var lx = pa.x - pb.x;
            var ly = pa.y - pb.y;
            var distance = Math.sqrt(lx * lx + ly * ly);
            if (distance < 132) {
              ctx.beginPath();
              ctx.strokeStyle = line + ((1 - distance / 132) * 0.16).toFixed(3) + ")";
              ctx.lineWidth = 0.7;
              ctx.moveTo(pa.x, pa.y);
              ctx.lineTo(pb.x, pb.y);
              ctx.stroke();
            }
          }
        }

        if (pointer.active) {
          var gradient = ctx.createRadialGradient(pointer.x, pointer.y, 0, pointer.x, pointer.y, 120);
          gradient.addColorStop(0, cursor);
          gradient.addColorStop(1, "rgba(255, 255, 255, 0)");
          ctx.fillStyle = gradient;
          ctx.fillRect(pointer.x - 120, pointer.y - 120, 240, 240);
        }

        window.requestAnimationFrame(draw);
      }

      resize();
      window.addEventListener("resize", resize, { passive: true });
      window.addEventListener("pointermove", trackPointer, { passive: true });
      window.addEventListener("pointerleave", releasePointer, { passive: true });
      window.requestAnimationFrame(draw);
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", initField);
    } else {
      initField();
    }
  })();
</script>
